<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dev Pipeline UI</title>
  <style>
    body { font-family: system-ui, Arial, sans-serif; margin: 24px; background: #0b1020; color: #e5e7eb; }
    h1,h2 { margin: 0 0 12px; }
    .grid { display: grid; grid-template-columns: 1.4fr 1fr; gap: 20px; }
    .card { background: #111827; border: 1px solid #374151; border-radius: 12px; padding: 14px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border-bottom: 1px solid #374151; padding: 8px; text-align: left; font-size: 14px; }
    .badge { padding: 3px 8px; border-radius: 999px; font-size: 12px; font-weight: 600; }
    .active { background:#14532d; color:#bbf7d0; }
    .paused { background:#3f3f46; color:#e4e4e7; }
    .blocked { background:#7f1d1d; color:#fecaca; }
    .stopped { background:#1f2937; color:#9ca3af; }
    .finished { background:#1e3a8a; color:#bfdbfe; }
    button, select { background:#1f2937; color:#e5e7eb; border:1px solid #4b5563; border-radius:8px; padding:6px 10px; }
    .muted { color:#9ca3af; font-size: 12px; }
    pre { white-space: pre-wrap; font-size: 12px; color:#cbd5e1; }
  </style>
</head>
<body>
  <h1>Dev Pipeline</h1>
  <p class="muted">Project status + run logs</p>

  <div class="grid">
    <div class="card">
      <h2>Projects</h2>
      <p>
        <label>Filter:
          <select id="statusFilter">
            <option value="all">all</option>
            <option value="active">active</option>
            <option value="paused">paused</option>
            <option value="blocked">blocked</option>
            <option value="stopped">stopped</option>
            <option value="finished">finished</option>
          </select>
        </label>
        <label style="margin-left:10px;">Sort:
          <select id="sortMode">
            <option value="status_then_name">status → name</option>
            <option value="name">name</option>
            <option value="priority_then_name">priority → name</option>
          </select>
        </label>
      </p>
      <table>
        <thead><tr><th>ID</th><th>Name</th><th>Status</th><th>Next milestone</th><th>Repo</th><th>Action</th></tr></thead>
        <tbody id="projects"></tbody>
      </table>
    </div>

    <div class="card">
      <h2>Controls</h2>
      <p><button id="runSweep">Run sweep now</button> <button id="runNotify">Run milestone notify</button> <button id="runRepoProc">Process repo prep</button></p>
      <p id="controlStatus" class="muted"></p>
      <h2 style="margin-top:16px">Project Detail</h2>
      <p class="muted">Select project timeline + send test email</p>
      <p>
        <select id="detailProject"></select>
        <button id="loadDetail">Load detail</button>
        <button id="sendTest">Send test email</button>
      </p>
      <div id="projectDetail" class="muted">(select a project)</div>
      <h2 style="margin-top:16px">Recent Notifications</h2>
      <pre id="notifications">(loading)</pre>
      <h2 style="margin-top:16px">Publish Requests</h2>
      <pre id="publishRequests">(loading)</pre>
    </div>
  </div>

  <div class="card" style="margin-top:20px;">
    <h2>Recent Runs</h2>
    <pre id="runs">(loading)</pre>
  </div>

  <script src="/webui/app.js"></script>
</body>
</html>
